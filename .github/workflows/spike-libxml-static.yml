name: Spike libxml static

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/spike-libxml-static.yml"
      - ".github/workflows/spike-libxml-windows.yml"
      - "spikes/libxml-probe/**"
      - "src-tauri/assets/schemas/**"

permissions:
  contents: read

env:
  VCPKG_DISABLE_METRICS: 1

jobs:
  probe-macos-static:
    name: macOS arm64 static (vcpkg)
    runs-on: macos-latest
    env:
      LIBXML2_STATIC: 1
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: arm64-osx
      PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg/installed/arm64-osx/lib/pkgconfig
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache vcpkg + libxml2
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-libxml2-arm64-osx-static-v1

      - name: Bootstrap vcpkg and install libxml2
        run: |
          if [ ! -x vcpkg/vcpkg ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg vcpkg
            ./vcpkg/bootstrap-vcpkg.sh
          fi
          ./vcpkg/vcpkg install libxml2:arm64-osx

      - name: Build libxml probe (static)
        run: cargo build --manifest-path spikes/libxml-probe/Cargo.toml --verbose

      - name: Run libxml probe (39 XSD compile + smoke validate)
        run: cargo run --manifest-path spikes/libxml-probe/Cargo.toml

      - name: Assert no libxml2 dylib runtime dependency
        run: |
          BIN="spikes/libxml-probe/target/debug/libxml-probe"
          otool -L "$BIN"
          if otool -L "$BIN" | grep -E 'libxml2.*\.dylib'; then
            echo "expected static libxml2 (no libxml2 dylib in otool -L)"
            exit 1
          fi
          echo "OK: no libxml2 dylib dependency"

  probe-windows-static:
    name: Windows x64 static (vcpkg)
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache vcpkg + libxml2
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-libxml2-x64-windows-static-v1

      - name: Bootstrap vcpkg and install libxml2
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" install libxml2:x64-windows-static
          & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

      - name: Build libxml probe (static)
        shell: pwsh
        run: cargo build --manifest-path spikes/libxml-probe/Cargo.toml --verbose

      - name: Run libxml probe (39 XSD compile + smoke validate)
        shell: pwsh
        run: cargo run --manifest-path spikes/libxml-probe/Cargo.toml

      - name: Assert no libxml2.dll runtime dependency
        shell: pwsh
        run: |
          $bin = "spikes\libxml-probe\target\debug\libxml-probe.exe"
          dumpbin /dependents $bin | Tee-Object -Variable deps
          if ($deps -match "libxml2\.dll") {
            Write-Error "expected static libxml2 (libxml2.dll still listed as dependent)"
          }
          Write-Host "OK: no libxml2.dll dependency"
