name: Spike libxml (Windows)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/spike-libxml-windows.yml"
      - "spikes/libxml-probe/**"
      - "src-tauri/assets/schemas/**"

permissions:
  contents: read

jobs:
  probe-windows:
    name: Windows MSVC + vcpkg libxml2
    runs-on: windows-latest
    env:
      VCPKGRS_DYNAMIC: 1
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache vcpkg + libxml2
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg
          key: vcpkg-libxml2-x64-windows-v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          }

      - name: Install libxml2 (x64-windows)
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install libxml2:x64-windows
          & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

      - name: Build libxml probe
        shell: pwsh
        run: cargo build --manifest-path spikes/libxml-probe/Cargo.toml --verbose

      - name: Run libxml probe (bundled OOXML XSD)
        shell: pwsh
        run: cargo run --manifest-path spikes/libxml-probe/Cargo.toml

      - name: Report libxml2 DLL location
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "libxml2.dll" C:\vcpkg\installed\x64-windows\bin -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "libxml2.dll: $($_.FullName)" }
