name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      publish_only:
        description: Skip check/build and only publish (reuse prior run artifacts)
        type: boolean
        default: false
      source_run_id:
        description: Workflow run ID containing build artifacts (required when publish_only)
        type: string
        required: false
      version:
        description: Release version tag (CalVer YYYY.M.D, e.g. 2026.6.14)
        type: string
        required: false

jobs:
  check:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache bundled Noto fonts
        uses: actions/cache@v4
        with:
          path: src-tauri/fonts
          key: bundled-noto-fonts-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            bundled-noto-fonts-

      - name: Install Linux compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Bundle JS libraries
        run: npm run bundle:js

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend test
        run: npm test

      - name: Frontend build
        run: npm run build

  build:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_only }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact: macos
          - platform: windows-latest
            args: ""
            artifact: windows
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache bundled Noto fonts
        uses: actions/cache@v4
        with:
          path: src-tauri/fonts
          key: bundled-noto-fonts-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            bundled-noto-fonts-

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Bundle JS libraries
        run: npm run bundle:js

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri bundles
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Find updater artifacts
        id: updater
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
            UPDATE_FILE=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          else
            BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
            UPDATE_FILE=$(find "$BUNDLE_DIR" -name "*-setup.exe" ! -name "*.sig" | head -1)
          fi
          if [[ -z "$UPDATE_FILE" || ! -f "$UPDATE_FILE" ]]; then
            echo "Updater bundle not found under $BUNDLE_DIR"
            exit 1
          fi
          SIG_FILE="${UPDATE_FILE}.sig"
          if [[ ! -f "$SIG_FILE" ]]; then
            echo "Updater signature not found: $SIG_FILE"
            exit 1
          fi
          echo "update_file=$UPDATE_FILE" >> "$GITHUB_OUTPUT"
          echo "sig_file=$SIG_FILE" >> "$GITHUB_OUTPUT"
          echo "Found updater bundle: $UPDATE_FILE"

      - name: Upload platform bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.artifact }}
          retention-days: 7
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.artifact }}
          retention-days: 7
          path: |
            ${{ steps.updater.outputs.update_file }}
            ${{ steps.updater.outputs.sig_file }}
          if-no-files-found: error

  publish:
    needs: [build]
    if: >-
      ${{
        always() && (
          (github.event_name == 'workflow_dispatch' && inputs.publish_only) ||
          (needs.build.result == 'success')
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_REGION: ${{ secrets.OSS_REGION }}
      ARTIFACT_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish-only inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_only }}
        run: |
          if [[ -z "${{ inputs.source_run_id }}" ]]; then
            echo "source_run_id is required when publish_only=true"
            exit 1
          fi
          if [[ -z "${{ inputs.version }}" ]]; then
            echo "version is required when publish_only=true"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bundles-*
          merge-multiple: true
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: updater-*
          merge-multiple: true
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: find dist -type f | sort

      - name: Generate latest.json
        run: node scripts/generate-latest-json.mjs dist

      - name: Install ossutil
        run: |
          install_dir="${GITHUB_WORKSPACE}/.ossutil"
          mkdir -p "$install_dir"
          curl -fsSL -o /tmp/ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip"
          unzip -qo /tmp/ossutil.zip -d /tmp/ossutil-extract
          install -m 755 /tmp/ossutil-extract/ossutil-2.3.0-linux-amd64/ossutil "${install_dir}/ossutil"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/ossutil" version

      - name: Configure ossutil
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          BUCKET_NAME="${OSS_BUCKET#oss://}"
          BUCKET_NAME="${BUCKET_NAME%/}"
          REGION_SHORT="${OSS_REGION#oss-}"
          REGION_SHORT="${REGION_SHORT%.aliyuncs.com}"
          ENDPOINT="oss-${REGION_SHORT}.aliyuncs.com"
          echo "OSS endpoint: https://${BUCKET_NAME}.${ENDPOINT}"
          getent hosts "${BUCKET_NAME}.${ENDPOINT}"
          echo "BUCKET_NAME=${BUCKET_NAME}" >> "${GITHUB_ENV}"
          echo "REGION_SHORT=${REGION_SHORT}" >> "${GITHUB_ENV}"
          echo "ENDPOINT=${ENDPOINT}" >> "${GITHUB_ENV}"
          cat > "${HOME}/.ossutilconfig" <<EOF
          [default]
          accessKeyId=${ALIYUN_ACCESS_KEY_ID}
          accessKeySecret=${ALIYUN_ACCESS_KEY_SECRET}
          region=${REGION_SHORT}
          endpoint=${ENDPOINT}
          EOF

      - name: Upload artifacts to OSS
        run: |
          BUCKET="oss://${BUCKET_NAME}"
          RELEASE_DIR="${BUCKET}/releases/${VERSION}"

          while IFS= read -r file; do
            name="$(basename "$file")"
            ossutil cp "$file" "${RELEASE_DIR}/${name}" -f --region "${REGION_SHORT}" -e "${ENDPOINT}"
          done < <(find dist -type f)

          ossutil cp latest.json "${BUCKET}/latest.json" \
            -f \
            --region "${REGION_SHORT}" \
            -e "${ENDPOINT}" \
            --cache-control "no-cache" \
            --content-type "application/json"

          echo "OSS upload complete:"
          ossutil ls "${RELEASE_DIR}/" --region "${REGION_SHORT}" -e "${ENDPOINT}"
          ossutil stat "${BUCKET}/latest.json" --region "${REGION_SHORT}" -e "${ENDPOINT}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Doc Agent ${{ env.VERSION }}
          body: |
            从下方 Assets 下载对应平台的安装包（备用渠道）。

            **国内用户推荐从阿里云 OSS 下载**

            macOS (Apple Silicon)：
            - [Doc Agent ${{ env.VERSION }} macOS DMG](https://doc-agent.oss-cn-guangzhou.aliyuncs.com/releases/${{ env.VERSION }}/DocAgent_${{ env.VERSION }}_aarch64.dmg)

            Windows (x86_64)：
            - [Doc Agent ${{ env.VERSION }} Windows NSIS 安装包](https://doc-agent.oss-cn-guangzhou.aliyuncs.com/releases/${{ env.VERSION }}/DocAgent_${{ env.VERSION }}_x64-setup.exe)

            应用内更新清单：
            - [latest.json](https://doc-agent.oss-cn-guangzhou.aliyuncs.com/latest.json)
          draft: false
          overwrite_files: true
          files: |
            dist/**/*
            latest.json
